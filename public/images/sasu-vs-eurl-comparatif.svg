<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 310" role="img" aria-label="Comparatif SASU vs EURL : cotisations sociales, protection sociale, dividendes, flexibilité et coût comptable">
  <title>Comparatif SASU vs EURL 2026</title>
  <rect width="560" height="310" fill="#f8faff" rx="12"/>

  <!-- Titre -->
  <text x="28" y="36" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#192152">SASU vs EURL : comparatif 2026</text>

  <!-- En-têtes colonnes -->
  <rect x="240" y="48" width="140" height="30" rx="6" fill="#3058e5"/>
  <text x="310" y="68" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">SASU</text>
  <rect x="392" y="48" width="140" height="30" rx="6" fill="#475569"/>
  <text x="462" y="68" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">EURL</text>

  <!-- Ligne 1 : Régime social -->
  <rect x="20" y="88" width="520" height="36" rx="6" fill="#fff"/>
  <text x="32" y="111" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#192152">Régime social</text>
  <text x="310" y="111" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#3058e5" font-weight="600" text-anchor="middle">Assimilé-salarié</text>
  <text x="462" y="111" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="middle">TNS (indépendant)</text>

  <!-- Ligne 2 : Cotisations -->
  <rect x="20" y="128" width="520" height="36" rx="6" fill="#f1f5f9"/>
  <text x="32" y="151" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#192152">Cotisations sociales</text>
  <!-- Barre SASU -->
  <rect x="246" y="136" width="110" height="14" rx="3" fill="#e2e8f0"/>
  <rect x="246" y="136" width="90" height="14" rx="3" fill="#3058e5" opacity="0.8"/>
  <text x="362" y="148" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#192152">~82%</text>
  <!-- Barre EURL -->
  <rect x="396" y="136" width="110" height="14" rx="3" fill="#e2e8f0"/>
  <rect x="396" y="136" width="55" height="14" rx="3" fill="#475569" opacity="0.8"/>
  <text x="516" y="148" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#192152">~45%</text>

  <!-- Ligne 3 : Protection sociale -->
  <rect x="20" y="168" width="520" height="36" rx="6" fill="#fff"/>
  <text x="32" y="191" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#192152">Protection sociale</text>
  <text x="310" y="191" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#0F7B5F" font-weight="700" text-anchor="middle">✓ Complète</text>
  <text x="462" y="191" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#D4582A" text-anchor="middle">Basique</text>

  <!-- Ligne 4 : Dividendes -->
  <rect x="20" y="208" width="520" height="36" rx="6" fill="#f1f5f9"/>
  <text x="32" y="231" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#192152">Dividendes</text>
  <text x="310" y="231" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#0F7B5F" font-weight="700" text-anchor="middle">Flat tax 30% seule</text>
  <text x="462" y="231" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#D4582A" text-anchor="middle">Flat tax + cotis. TNS</text>

  <!-- Ligne 5 : Coût comptable -->
  <rect x="20" y="248" width="520" height="36" rx="6" fill="#fff"/>
  <text x="32" y="271" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#192152">Coût comptable / an</text>
  <text x="310" y="271" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="middle">1 200€ – 2 500€</text>
  <text x="462" y="271" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#0F7B5F" font-weight="700" text-anchor="middle">800€ – 1 500€</text>

  <!-- Note bas -->
  <text x="280" y="300" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Source : paul-entreprend.fr — données 2026</text>
</svg>
